services:
  - type: web
    name: fortress
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
